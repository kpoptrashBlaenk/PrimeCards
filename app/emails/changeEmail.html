<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confirm Your Email Change</title>
    <style>
      body {
        font-family: 'Aura', Arial, sans-serif;
        margin: 0;
        padding: 0;
      }
      .container {
        max-width: 600px;
        margin: 0 auto;
        padding: 24px;
        border-radius: 8px;
        text-align: center;
        background-color: #09090b;
      }
      .logo {
        font-size: 28px;
        font-weight: bold;
        text-decoration: none;
        background: linear-gradient(90deg, #fce7f3, #f9a8d4, #ec4899, #9d174d);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        color: #ff2eb5;
        display: inline-block;
      }
      h1 {
        font-size: 22px;
        color: #ffffff;
      }
      p {
        font-size: 16px;
        color: #bbbbbb;
        line-height: 1.5;
      }
      .button {
        display: inline-block;
        background-color: #f472b6;
        color: #000000;
        padding: 12px 24px;
        text-decoration: none;
        border-radius: 6px;
        font-weight: bold;
        margin-bottom: 24px;
      }
      hr {
        border: none;
        border-top: 1px solid #e5e7eb;
      }
      .footer-logo {
        font-size: 18px;
        font-weight: bold;
        text-decoration: none;
        background: linear-gradient(90deg, #fce7f3, #f9a8d4, #ec4899, #9d174d);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        color: #f472b6;
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <a href="localhost:3000" class="logo">PrimeCards</a>

      <h1>Confirm Your Email Change</h1>

      <hr />

      <p>
        You requested to change your email address from {{ .Email }} to {{ .NewEmail }} on PrimeCards. Please confirm this change
        by clicking the button below.
      </p>

      <a href="{{ .ConfirmationURL }}" class="button">Confirm My Email</a>

      <hr />

      <a href="localhost:3000" class="footer-logo">PrimeCards</a>
    </div>
  </body>
</html>
